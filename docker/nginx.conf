worker_processes 1;
events { worker_connections 512; }

http {
  # WebSocket upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Timeouts pro Metro bundler
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_connect_timeout 10s;
  client_max_body_size 50m;

  # Tipos a rewrite no body (Expo retorna manifest como text/plain)
  sub_filter_types text/plain application/json application/javascript text/javascript text/html;
  sub_filter_once off;

  server {
    listen 80;
    server_name _;

    location / {
      # host.docker.internal aponta pro host do Docker (onde roda o Expo via systemd)
      proxy_pass http://host.docker.internal:8083;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support (Metro HMR, dev tools)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Rewrite http://expo.gastronomiarural...:8083 → https://expo.gastronomiarural...
      sub_filter 'http://expo.gastronomiarural.viptecnologia.com.br:8083' 'https://expo.gastronomiarural.viptecnologia.com.br';
      sub_filter 'expo.gastronomiarural.viptecnologia.com.br:8083' 'expo.gastronomiarural.viptecnologia.com.br';

      # Remove Content-Length pra sub_filter poder mudar tamanho do body
      proxy_set_header Accept-Encoding "";
    }
  }
}
