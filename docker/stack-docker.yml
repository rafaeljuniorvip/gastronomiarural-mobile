version: "3.8"

# Stack: gastronomiarural-expo-proxy
# Proxy HTTPS na frente do Expo dev server rodando no host (porta 8084).
# Necessário pra iOS Expo Go que bloqueia HTTP de IPs/domínios públicos (ATS).

services:
  proxy:
    image: nginx:alpine
    configs:
      - source: gastronomiarural_expo_nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - minha_rede
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.gastronomiarural-expo.rule=Host(`expo.gastronomiarural.viptecnologia.com.br`)"
        - "traefik.http.routers.gastronomiarural-expo.entrypoints=websecure"
        - "traefik.http.routers.gastronomiarural-expo.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gastronomiarural-expo.loadbalancer.server.port=80"

configs:
  gastronomiarural_expo_nginx_conf:
    external: true

networks:
  minha_rede:
    external: true
